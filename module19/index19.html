<!DOCTYPE html>
<html>
<head>
    <title>Responsive Website</title>
    <link rel="stylesheet" href="styles19.css">
</head>
<body>

    <!-- Navigation -->
    <nav>
        <h2>MyStore</h2>

        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Products</a></li>
            <li><a href="#">Gallery</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-text">
            <h1>Welcome to MyStore</h1>
            <p>Best Products at Affordable Prices</p>
            <button>Shop Now</button>
        </div>

        <div class="hero-image">
            <img src="https://picsum.photos/500/300" alt="Hero Image">
        </div>
    </section>

    <!-- Product Cards -->
    <section class="products">

        <div class="card">
            <img src="https://picsum.photos/200" alt="">
            <h3>Laptop</h3>
            <p>$1000</p>
        </div>

        <div class="card">
            <img src="https://picsum.photos/201" alt="">
            <h3>Mobile</h3>
            <p>$700</p>
        </div>

        <div class="card">
            <img src="https://picsum.photos/202" alt="">
            <h3>Headphones</h3>
            <p>$150</p>
        </div>

    </section>

    <!-- Gallery -->
    <section class="gallery">

        <img src="https://picsum.photos/300?1">
        <img src="https://picsum.photos/300?2">
        <img src="https://picsum.photos/300?3">
        <img src="https://picsum.photos/300?4">

    </section>

    <!-- Footer -->
    <footer>
        <div>
            <h3>About</h3>
            <p>Responsive Website Example</p>
        </div>

        <div>
            <h3>Links</h3>
            <p>Home</p>
            <p>Products</p>
        </div>

        <div>
            <h3>Contact</h3>
            <p>Email: info@gmail.com</p>
        </div>
    </footer>

</body>
</html>
