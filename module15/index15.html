<!DOCTYPE html>
<html>
<head>
    <title>Pricing Section</title>
    <link rel="stylesheet" href="styles15.css">
</head>
<body>

<section class="pricing">

    <h1>Our Pricing Plans</h1>

    <div class="pricing-container">

        <!-- Basic Plan -->
        <div class="card">
            <h2>Basic</h2>

            <ul>
                <li>1 Website</li>
                <li>5 GB Storage</li>
                <li>Email Support</li>
            </ul>

            <h3>$10/month</h3>

            <button>Subscribe</button>
        </div>

        <!-- Standard Plan -->
        <div class="card">
            <h2>Standard</h2>

            <ul>
                <li>5 Websites</li>
                <li>50 GB Storage</li>
                <li>24/7 Support</li>
            </ul>

            <h3>$25/month</h3>

            <button>Subscribe</button>
        </div>

        <!-- Premium Plan -->
        <div class="card">
            <h2>Premium</h2>

            <ul>
                <li>Unlimited Websites</li>
                <li>200 GB Storage</li>
                <li>Priority Support</li>
            </ul>

            <h3>$50/month</h3>

            <button>Subscribe</button>
        </div>

    </div>

</section>

</body>
</html>
