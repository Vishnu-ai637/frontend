<!DOCTYPE html>
<html>
<head>
    <title>Product Cards</title>
    <link rel="stylesheet" href="styles9.css">
</head>
<body>

    <h1>Our Products</h1>

    <div class="container">

        <div class="card">
            <img src="/module9/headphone.jpg" alt="Product">
            <h3>Headphones</h3>
            <p>Price: ₹999</p>
            <p>⭐⭐⭐⭐☆</p>
            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="/module9/watch.jpg" alt="Product">
            <h3>Smart Watch</h3>
            <p>Price: ₹1499</p>
            <p>⭐⭐⭐⭐⭐</p>
            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="/module9/phones.avif" alt="Product" width="170" height="170">
            <h3>Mobile Phone</h3>
            <p>Price: ₹12999</p>
            <p>⭐⭐⭐⭐☆</p>
            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="/module9/laptop.jpg" alt="Product" width="170" height="170">
            <h3>Laptop</h3>
            <p>Price: ₹45999</p>
            <p>⭐⭐⭐⭐⭐</p>
            <button>Buy Now</button>
        </div>

    </div>

</body>
</html>
