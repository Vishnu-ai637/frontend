<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="styles16.css">
</head>
<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Admin</h2>

        <ul>
            <li>Dashboard</li>
            <li>Users</li>
            <li>Products</li>
            <li>Orders</li>
            <li>Settings</li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main">

        <!-- Header -->
        <div class="header">
            <h1>Dashboard</h1>
        </div>

        <!-- Statistics Cards -->
        <div class="cards">

            <div class="card">
                <h3>Users</h3>
                <p>150</p>
            </div>

            <div class="card">
                <h3>Orders</h3>
                <p>80</p>
            </div>

            <div class="card">
                <h3>Products</h3>
                <p>60</p>
            </div>

            <div class="card">
                <h3>Revenue</h3>
                <p>₹50,000</p>
            </div>

        </div>

        <!-- Recent Activity Table -->
        <h2>Recent Activity</h2>

        <table>
            <tr>
                <th>Name</th>
                <th>Activity</th>
                <th>Status</th>
            </tr>

            <tr>
                <td>Vishnu</td>
                <td>Placed Order</td>
                <td>Completed</td>
            </tr>

            <tr>
                <td>Rahul</td>
                <td>Added Product</td>
                <td>Pending</td>
            </tr>

            <tr>
                <td>Anjali</td>
                <td>Updated Profile</td>
                <td>Completed</td>
            </tr>

        </table>

    </div>

</div>

</body>
</html>
